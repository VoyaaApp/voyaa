<div class="auth-page">
  <img src="Voyaa-colour.png" alt="Voyaa" class="logo">
  <h1>Reset Password</h1>
  <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
  <form (ngSubmit)="sendReset()">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required aria-label="Email address">
    <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Sending...' : 'Send Reset Link' }}</button>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }
  </form>
  <p class="switch"><a routerLink="/login">Back to Login</a></p>
</div>
