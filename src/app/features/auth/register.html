<div class="auth-page">
  <img src="voyaa.png" alt="Voyaa" class="logo">
  <h1>Create Account</h1>
  <form (ngSubmit)="register()">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
    <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required>
    <input type="text" [(ngModel)]="username" name="username" placeholder="Username" required autocomplete="off">
    <label class="dob-label">Date of Birth</label>
    <div class="dob-row">
      <input type="text" [(ngModel)]="dobDay" name="dobDay" placeholder="DD" maxlength="2" required>
      <input type="text" [(ngModel)]="dobMonth" name="dobMonth" placeholder="MM" maxlength="2" required>
      <input type="text" [(ngModel)]="dobYear" name="dobYear" placeholder="YYYY" maxlength="4" required>
    </div>
    <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Creating account...' : 'Sign Up' }}</button>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </form>
  <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
</div>
