<div class="auth-page">
  <img src="Voyaa-colour.png" alt="Voyaa" class="logo">
  <h1>Welcome Back</h1>
  <form (ngSubmit)="login()">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
    <div class="password-wrapper">
      <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Password" required>
      <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
        <span class="material-symbols-rounded">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
      </button>
    </div>
    <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Logging in...' : 'Log In' }}</button>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </form>
  <p class="switch">Don't have an account? <a routerLink="/register">Sign up</a></p>
</div>
